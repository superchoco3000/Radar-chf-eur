name: Radar Rates Update

on:
  schedule:
    # S'exécute toutes les heures (0 * * * *) ou une fois par jour (ex: 0 8 * * *)
    - cron: '0 8-18 * * *' 
  workflow_dispatch: # Permet de lancer le script manuellement depuis GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run Scrapers
        run: |
          npx tsx services/scrapers/douane_officielle_scraper.ts
          npx tsx services/scrapers/bsharpe_scraper.ts
          npx tsx services/scrapers/revolut_scraper.ts
          npx tsx services/scrapers/moneyand_scraper.ts
        env:
          # On passera ces variables plus tard pour plus de sécurité
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}