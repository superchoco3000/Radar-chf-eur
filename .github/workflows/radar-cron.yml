name: Radar Army Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    # ✅ ON DÉCLARE LES SECRETS ICI (NIVEAU GLOBAL DU JOB)
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Radar Army
        # ✅ On ajoute "|| true" à chaque ligne pour que si un site plante, 
        # l'armée continue la mission pour les autres.
        run: |
          npx tsx services/scrapers/bcge_scraper.ts || true
          npx tsx services/scrapers/bsharpe_scraper.ts || true
          npx tsx services/scrapers/change_geneve_scraper.ts || true
          npx tsx services/scrapers/changesavoisien_scraper.ts || true
          npx tsx services/scrapers/douane_officielle_scraper.ts || true
          npx tsx services/scrapers/ibani_scraper.ts || true
          npx tsx services/scrapers/leman_montblanc_scraper.ts || true
          npx tsx services/scrapers/lyland_scraper.ts || true
          npx tsx services/scrapers/migros_scraper.ts || true
          npx tsx services/scrapers/moneyand_scraper.ts || true
          npx tsx services/scrapers/revolut_scraper.ts || true
          npx tsx services/scrapers/telexoo_scraper.ts || true
          npx tsx services/scrapers/wise_scraper.ts || true